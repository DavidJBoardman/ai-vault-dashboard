name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync backend dependencies
        run: uv sync --directory backend --extra build --frozen

      - name: Package macOS app
        run: npm run package:ci:mac

      - name: Upload macOS artefacts
        uses: actions/upload-artifact@v4
        with:
          name: vault-analyser-macos
          path: |
            dist/*.dmg
            dist/mac*/

  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync backend dependencies
        run: uv sync --directory backend --extra build --frozen

      - name: Package Windows app
        run: npm run package:ci:win

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: vault-analyser-windows
          path: |
            dist/*.exe
            dist/win-unpacked/
